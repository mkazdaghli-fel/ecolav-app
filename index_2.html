function App() {
  const [page,setPage]=useState("accueil");
  const [lang,setLang]=useState("fr");
  const t=TRANSLATIONS[lang];
  const [clients,setClients]=useState(initialClients);
  const [reservations,setReservations]=useState([]);
  const [historique,setHistorique]=useState([]);
  const [joursFeries,setJoursFeries]=useState([]);
  const [syncStatus,setSyncStatus]=useState("loading");
  const [search,setSearch]=useState("");
  const [showModal,setShowModal]=useState(null);
  const [notification,setNotification]=useState(null);
  const [notifList,setNotifList]=useState([]);
  const [showNotifPanel,setShowNotifPanel]=useState(false);
  const [form,setForm]=useState({nom:"",tel:"",voiture:"",plaque:"",type:"Intérieur Extérieur"});
  const [importText,setImportText]=useState("");
  const [planDate,setPlanDate]=useState(()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");});
  const [ferieForm,setFerieForm]=useState({date:"",label:""});
  const [resForm,setResForm]=useState({client:"",tel:"",voiture:"",plaque:"",type:"Intérieur Extérieur",date:"",heure:"",piste:"",clientFound:false});
  const [accueilStep,setAccueilStep]=useState("services");
  const [selectedService,setSelectedService]=useState(null);
  const [clientTel,setClientTel]=useState("");
  const [clientFound,setClientFound]=useState(null);
  const [clientHistorique,setClientHistorique]=useState(null);

  const notify=(msg)=>{setNotification(msg);setTimeout(()=>setNotification(null),3000);};
  const addNotif=(type,msg,detail)=>setNotifList(prev=>[{id:Date.now(),type,msg,detail,time:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),lu:false},...prev.slice(0,49)]);

  // Load from Supabase on mount
  useEffect(()=>{
    const load=async()=>{
      setSyncStatus("loading");
      try {
        const [res,hist,fer,extra]=await Promise.all([sbGet("reservations"),sbGet("historique"),sbGet("feries"),sbGet("clients_extra")]);
        if(res.length>0) setReservations(res);
        if(hist.length>0) setHistorique(hist);
        if(fer.length>0) setJoursFeries(fer);
        if(extra.length>0){
          setClients(prev=>{
            const ids=new Set(prev.map(c=>c.id));
            const toAdd=extra.filter(c=>!ids.has(c.id));
            return toAdd.length>0?[...prev,...toAdd]:prev;
          });
        }
        setSyncStatus("ok");
      } catch(e){ setSyncStatus("err"); }
    };
    load();
    const interval=setInterval(()=>{
      sbGet("reservations").then(res=>{if(res.length>=0)setReservations(res);});
    },30000);
    return ()=>clearInterval(interval);
  },[]);

  const timeToMin=(hhmm)=>{const[h,m]=hhmm.split(":").map(Number);return h*60+m;};
  const minToTime=(m)=>String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
  const addMinutes=(hhmm,mins)=>minToTime(timeToMin(hhmm)+mins);
  const openMin=OPEN_H*60+OPEN_M,closeMin=CLOSE_H*60+CLOSE_M;
  const localToday=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};

  const isSunday=(d)=>new Date(d).getDay()===0;
  const isJourFerie=(d)=>joursFeries.some(f=>f.date===d);
  const isJourBloque=(d)=>isSunday(d)||isJourFerie(d);
  const getRaisonBlocage=(d)=>{if(isSunday(d))return t.ferme;const f=joursFeries.find(f=>f.date===d);return f?t.ferie_prefix+f.label:null;};

  const getSlots=(date,piste,duree)=>{
    const slots=[];
    const today=localToday();
    const now=new Date();
    const isToday=date===today;
    const curMin=isToday?now.getHours()*60+now.getMinutes():0;
    for(let t2=openMin;t2+duree<=closeMin;t2+=30){
      const debut=minToTime(t2),fin=minToTime(t2+duree);
      const isPast=isToday&&t2<=curMin;
      const conflict=reservations.some(r=>r.date===date&&r.piste===piste&&r.statut!=="Annulé"&&timeToMin(r.heure)<t2+duree&&timeToMin(r.fin)>t2);
      slots.push({debut,fin,dispo:!conflict&&!isPast,past:isPast});
    }
    return slots;
  };

  const getPisteDisponibilite=(date,piste,duree)=>{
    const slots=getSlots(date,piste,duree);
    const available=slots.filter(s=>s.dispo);
    return{available:available.length,total:slots.length,firstAvail:available[0],heuresFree:Math.round(available.length*30/60*10)/10};
  };

  const getResForDate=(date)=>reservations.filter(r=>r.date===date&&r.statut!=="Annulé");

  const handleAddReservation=async()=>{
    if(!resForm.client||!resForm.date||!resForm.heure||!resForm.piste){notify(t.err_champs);return;}
    const now=new Date();
    const[yy,mm,dd]=resForm.date.split("-").map(Number);
    const[hh,min]=resForm.heure.split(":").map(Number);
    if(new Date(yy,mm-1,dd,hh,min)<now){notify(t.err_passe);return;}
    if(isSunday(resForm.date)){notify(t.err_dimanche);return;}
    if(isJourFerie(resForm.date)){notify("⛔ "+getRaisonBlocage(resForm.date));return;}
